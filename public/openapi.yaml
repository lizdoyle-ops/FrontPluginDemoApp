openapi: 3.0.3
info:
  title: Property CRM Demo API
  version: 1.0.0
  description: |
    Demo REST API for the Property Management Front plugin.
    Send header `Authorization: Bearer <token>` (see Back Office View → API docs tab at `/crm?tab=api`; env `NEXT_PUBLIC_DEMO_API_TOKEN`).

    **Single records (per contact email):** For each nested object type (properties, quotes, cases, inquiries, contracts, attachments, work orders, invoices, pets, policies, claims),
    use **GET** `.../{id}` to read one record and **POST** `.../{id}` (or **PUT**) with a JSON body to create or replace that id.
    Collection **POST** `.../cases` (etc.) also upserts by `id` in the body. **Policyholder** and **cover** are singletons: **GET**/**PUT** on `.../policyholder` and `.../cover` only. Timeline events use **index** instead of id (see `/timeline/{index}`).
servers:
  - url: https://front-plugin-demo-app.vercel.app
    description: Production (Vercel)
  - url: http://localhost:3000
    description: Local Next.js dev
paths:
  /api/contacts:
    get:
      summary: List contacts
      parameters:
        - name: full
          in: query
          schema:
            type: string
            enum: ["1"]
          description: If `full=1`, returns full ContactData objects; otherwise summaries only.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      type: object
    post:
      summary: Create a new contact (409 if email exists)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactData"
      responses:
        "201":
          description: Created contact
        "409":
          description: Contact already exists
  /api/contacts/{email}:
    parameters:
      - name: email
        in: path
        required: true
        schema:
          type: string
        description: URL-encoded email address
    get:
      summary: Get one contact
      responses:
        "200":
          description: ContactData
        "404":
          description: Not found
    put:
      summary: Replace contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactData"
      responses:
        "200":
          description: Updated contact
        "400":
          description: Validation error
    patch:
      summary: Shallow merge contact fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Partial ContactData
      responses:
        "200":
          description: Updated contact
        "404":
          description: Not found
    delete:
      summary: Delete contact from demo store
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found
  /api/contacts/{email}/work-orders:

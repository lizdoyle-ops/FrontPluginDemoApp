openapi: 3.0.3
info:
  title: Property CRM Demo API
  version: 1.0.0
  description: |
    Demo REST API for the Property Management Front plugin.
    Send header `Authorization: Bearer <token>` (see CRM workspace → API docs tab at `/crm?tab=api`; env `NEXT_PUBLIC_DEMO_API_TOKEN`).
servers:
  - url: https://front-plugin-demo-app.vercel.app
    description: Production (Vercel)
  - url: http://localhost:3000
    description: Local Next.js dev
paths:
  /api/contacts:
    get:
      summary: List contacts
      parameters:
        - name: full
          in: query
          schema:
            type: string
            enum: ["1"]
          description: If `full=1`, returns full ContactData objects; otherwise summaries only.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  contacts:
                    type: array
                    items:
                      type: object
    post:
      summary: Create a new contact (409 if email exists)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactData"
      responses:
        "201":
          description: Created contact
        "409":
          description: Contact already exists
  /api/contacts/{email}:
    parameters:
      - name: email
        in: path
        required: true
        schema:
          type: string
        description: URL-encoded email address
    get:
      summary: Get one contact
      responses:
        "200":
          description: ContactData
        "404":
          description: Not found
    put:
      summary: Replace contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactData"
      responses:
        "200":
          description: Updated contact
        "400":
          description: Validation error
    patch:
      summary: Shallow merge contact fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Partial ContactData
      responses:
        "200":
          description: Updated contact
        "404":
          description: Not found
    delete:
      summary: Delete contact from demo store
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found
  /api/contacts/{email}/work-orders:
    post:
      summary: Create or upsert work order (by body id)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrder"
      responses:
        "201":
          description: Updated contact with work orders
        "404":
          description: Contact not found
  /api/contacts/{email}/work-orders/{id}:
    get:
      summary: Get one work order by id
      responses:
        "200":
          description: Work order
        "404":
          description: Contact or work order not found
    post:
      summary: Create or upsert work order (path id)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrder"
      responses:
        "201":
          description: Updated contact with work orders
        "404":
          description: Contact not found
    put:
      summary: Upsert work order with path id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkOrder"
      responses:
        "200":
          description: Updated contact
    delete:
      summary: Remove work order
      responses:
        "200":
          description: Updated contact
  /api/contacts/{email}/invoices:
    post:
      summary: Create or upsert invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Invoice"
      responses:
        "201":
          description: Updated contact
  /api/contacts/{email}/invoices/{id}:
    get:
      summary: Get one invoice by id
      responses:
        "200":
          description: Invoice
        "404":
          description: Contact or invoice not found
    put:
      summary: Upsert invoice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Invoice"
      responses:
        "200":
          description: Updated contact
    delete:
      summary: Remove invoice
      responses:
        "200":
          description: Updated contact
  /api/contacts/{email}/cases:
    post:
      summary: Create or upsert support case (id in body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Case"
      responses:
        "201":
          description: Updated contact
        "404":
          description: Contact not found
  /api/contacts/{email}/cases/{id}:
    get:
      summary: Get one case by id
      responses:
        "200":
          description: Case
        "404":
          description: Not found
  /api/contacts/{email}/properties:
    post:
      summary: Create or upsert property (id in body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Property"
      responses:
        "201":
          description: Updated contact
        "404":
          description: Contact not found
  /api/contacts/{email}/properties/{id}:
    get:
      summary: Get one property by id
      responses:
        "200":
          description: Property
        "404":
          description: Not found
  /api/contacts/{email}/quotes:
    post:
      summary: Create or upsert quote (id in body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Quote"
      responses:
        "201":
          description: Updated contact
        "404":
          description: Contact not found
  /api/contacts/{email}/quotes/{id}:
    get:
      summary: Get one quote by id
      responses:
        "200":
          description: Quote
        "404":
          description: Not found
  /api/contacts/{email}/inquiries:
    post:
      summary: Create or upsert inquiry (id in body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Inquiry"
      responses:
        "201":
          description: Updated contact
        "404":
          description: Contact not found
  /api/contacts/{email}/inquiries/{id}:
    get:
      summary: Get one inquiry by id
      responses:
        "200":
          description: Inquiry
        "404":
          description: Not found
  /api/contacts/{email}/contracts:
    post:
      summary: Create or upsert contract (id in body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Contract"
      responses:
        "201":
          description: Updated contact
        "404":
          description: Contact not found
  /api/contacts/{email}/contracts/{id}:
    get:
      summary: Get one contract by id
      responses:
        "200":
          description: Contract
        "404":
          description: Not found
  /api/contacts/{email}/timeline:
    post:
      summary: Create or upsert timeline event (id in body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimelineEvent"
      responses:
        "201":
          description: Updated contact
        "404":
          description: Contact not found
  /api/contacts/{email}/timeline/{id}:
    get:
      summary: Get one timeline event by id
      responses:
        "200":
          description: Timeline event
        "404":
          description: Not found
  /api/contacts/{email}/attachments:
    post:
      summary: Create or upsert attachment (id in body)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Attachment"
      responses:
        "201":
          description: Updated contact
        "404":
          description: Contact not found
  /api/contacts/{email}/attachments/{id}:
    get:
      summary: Get one attachment by id
      responses:
        "200":
          description: Attachment
        "404":
          description: Not found
  /api/contacts/{email}/custom-lists/{listId}/rows:
    post:
      summary: Append a row to a custom list (Admin object id as listId)
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
          description: Custom object definition id (e.g. obj-123)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomListRow"
      responses:
        "201":
          description: Updated contact
        "404":
          description: Contact not found
  /api/contacts/{email}/custom-lists/{listId}/rows/{index}:
    get:
      summary: Fetch one custom list row by zero-based index
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Row payload with listId, index, and row
        "404":
          description: Not found
components:
  schemas:
    Case:
      type: object
      required: [id, subject, status, openedAt]
      properties:
        id: { type: string }
        subject: { type: string }
        status:
          type: string
          enum: [open, in_progress, resolved]
        openedAt: { type: string }
        priority:
          type: string
          enum: [low, medium, high]
    Property:
      type: object
      required: [id, address, city, postcode, status]
      properties:
        id: { type: string }
        address: { type: string }
        city: { type: string }
        postcode: { type: string }
        status:
          type: string
          enum: [active, pending, completed]
        rentMonthly: { type: number }
        notes: { type: string }
    Quote:
      type: object
      required: [id, title, amount, currency, status]
      properties:
        id: { type: string }
        title: { type: string }
        amount: { type: number }
        currency: { type: string }
        status:
          type: string
          enum: [pending, accepted, expired]
        validUntil: { type: string }
    Inquiry:
      type: object
      required: [id, subject, date, channel]
      properties:
        id: { type: string }
        subject: { type: string }
        date: { type: string }
        channel: { type: string }
    Contract:
      type: object
      required: [id, title, type, status, startDate]
      properties:
        id: { type: string }
        title: { type: string }
        type:
          type: string
          enum: [lease, service, vendor, corporate]
        status:
          type: string
          enum: [active, expired, pending_renewal]
        startDate: { type: string }
        endDate: { type: string }
    TimelineEvent:
      type: object
      required: [id, type, title, date]
      properties:
        id: { type: string }
        type:
          type: string
          enum: [inquiry, quote, reservation, note, contract, payment]
        title: { type: string }
        date: { type: string }
        detail: { type: string }
    Attachment:
      type: object
      required: [id, name, category, uploadedAt]
      properties:
        id: { type: string }
        name: { type: string }
        category: { type: string }
        url: { type: string }
        uploadedAt: { type: string }
    CustomListRow:
      type: object
      additionalProperties:
        type: string
      description: Map of field key to string value (matches admin-defined columns)
    WorkOrder:
      type: object
      required: [id, title, type, status]
      properties:
        id: { type: string }
        title: { type: string }
        type:
          type: string
          enum: [maintenance, repair, inspection, cleaning]
        status:
          type: string
          enum: [scheduled, in_progress, completed]
        scheduledFor: { type: string }
        propertyId: { type: string }
    Invoice:
      type: object
      required: [id, reference, amount, currency, status]
      properties:
        id: { type: string }
        reference: { type: string }
        amount: { type: number }
        currency: { type: string }
        status:
          type: string
          enum: [draft, pending, paid, overdue]
        dueDate: { type: string }
    ContactData:
      type: object
      required:
        - email
        - name
        - company
        - role
        - segment
        - tags
        - properties
        - quotes
        - inquiries
        - cases
        - workOrders
        - contracts
        - timeline
        - attachments
        - invoices
      properties:
        email: { type: string, format: email }
        name: { type: string }
        company: { type: string }
        role: { type: string }
        segment: { type: string }
        tags:
          type: array
          items: { type: string }
        properties:
          type: array
          items: { $ref: "#/components/schemas/Property" }
        quotes:
          type: array
          items: { $ref: "#/components/schemas/Quote" }
        inquiries:
          type: array
          items: { $ref: "#/components/schemas/Inquiry" }
        cases:
          type: array
          items: { $ref: "#/components/schemas/Case" }
        workOrders:
          type: array
          items: { $ref: "#/components/schemas/WorkOrder" }
        contracts:
          type: array
          items: { $ref: "#/components/schemas/Contract" }
        timeline:
          type: array
          items: { $ref: "#/components/schemas/TimelineEvent" }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/Attachment" }
        invoices:
          type: array
          items: { $ref: "#/components/schemas/Invoice" }

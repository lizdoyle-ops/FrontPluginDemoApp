        "200": { description: Updated contact }
        "400": { description: Validation error }
        "404": { description: Contact not found }
    delete:
      summary: Remove claim
      responses:
        "200": { description: Updated contact }
        "404": { description: Contact not found }
  /api/contacts/{email}/custom-lists/{listId}/rows:
    post:
      summary: Append a row to a custom list (Admin object id as listId)
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
          description: Custom object definition id (e.g. obj-123)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomListRow"
      responses:
        "201":
          description: Updated contact
        "404":
          description: Contact not found
  /api/contacts/{email}/custom-lists/{listId}/rows/{index}:
    get:
      summary: Fetch one custom list row by zero-based index
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Row payload with listId, index, and row
        "404":
          description: Not found
    put:
      summary: Replace custom list row at index
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomListRow"
      responses:
        "200":
          description: Updated contact
        "400":
          description: Validation error
        "404":
          description: Contact or row not found
    delete:
      summary: Remove custom list row at index
      parameters:
        - name: index
          in: path
          required: true
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: Updated contact
        "404":
          description: Contact or row not found
components:
  schemas:
    Opportunity:
      type: object
      required: [id, title, stage]
      properties:
        id: { type: string }
        title: { type: string }
        stage:
          type: string
          enum:
            - prospecting
            - qualified
            - proposal
            - negotiation
            - won
            - lost
        amount: { type: number }
        currency: { type: string }
        expectedCloseDate: { type: string }
        notes: { type: string }
    Order:
      type: object
      required: [id, title, status, orderedAt, total, currency]
      properties:
        id: { type: string }
        title: { type: string }
        status:
          type: string
          enum:
            - pending
            - confirmed
            - processing
            - fulfilled
            - cancelled
        orderedAt: { type: string }
        total: { type: number }
        currency: { type: string }
        fulfilledAt: { type: string }
        notes: { type: string }
    Case:
      type: object
      required: [id, subject, status, openedAt]
      properties:
        id: { type: string }
        subject: { type: string }
        status:
          type: string
          enum: [open, in_progress, resolved]
        openedAt: { type: string }
        priority:
          type: string
          enum: [low, medium, high]
    Property:
      type: object
      required: [id, address, city, postcode, status]
      properties:
        id: { type: string }
        address: { type: string }
        city: { type: string }
        postcode: { type: string }
        status:
          type: string
          enum: [active, pending, completed]
        rentMonthly: { type: number }
        notes: { type: string }
    Quote:
      type: object
      required: [id, title, amount, currency, status]
      properties:
        id: { type: string }
        title: { type: string }
        amount: { type: number }
        currency: { type: string }
        status:
          type: string
          enum: [pending, accepted, expired]
        validUntil: { type: string }
    Inquiry:
      type: object
      required: [id, subject, date, channel]
      properties:
        id: { type: string }
        subject: { type: string }
        date: { type: string }
        channel: { type: string }
    Contract:
      type: object
      required: [id, title, type, status, startDate]
      properties:
        id: { type: string }
        title: { type: string }
        type:
          type: string
          enum: [lease, service, vendor, corporate]
        status:
          type: string
          enum: [active, expired, pending_renewal]
        startDate: { type: string }
        endDate: { type: string }
    TimelineEvent:
      type: object
      required: [type, title, date]
      properties:
        type:
          type: string
          enum: [inquiry, quote, reservation, note, contract, payment]
        title: { type: string }
        date: { type: string }
        detail: { type: string }
    Attachment:
      type: object
      required: [id, name, category, uploadedAt]
      properties:
        id: { type: string }
        name: { type: string }
        category: { type: string }
        url: { type: string }
        uploadedAt: { type: string }
    PetPreExistingCondition:
      type: object
      required: [condition, notedDate, status, excludedFromCover]
      properties:
        condition: { type: string }
        notedDate: { type: string }
        status: { type: string }
        excludedFromCover: { type: boolean }
    Pet:
      type: object
      required: [id, name, species]
      properties:
        id: { type: string }
        name: { type: string }
        species: { type: string }
        breed: { type: string }
        dob: { type: string }
        age: { type: number }
        gender:
          type: string
          enum: [male, female, unknown]
        neutered: { type: boolean }
        microchip: { type: string }
        preExistingConditions:
          type: array
          items: { $ref: "#/components/schemas/PetPreExistingCondition" }
        authorisedContacts: { type: string }
        notes: { type: string }
    PolicyRecord:
      type: object
      required:
        - id
        - policyNumber
        - product
        - status
        - startDate
        - renewalDate
        - annualPremium
        - paymentFrequency
        - monthlyDirectDebit
        - paymentStatus
      properties:
        id: { type: string }
        policyNumber: { type: string }
        product: { type: string }
        status: { type: string }
        startDate: { type: string }
        renewalDate: { type: string }
        annualPremium: { type: number }
        paymentFrequency: { type: string }
        monthlyDirectDebit: { type: number }
        paymentStatus: { type: string }
    Policyholder:
      type: object
      required: [name, dob, email, phone, address, authorisedContacts]
      properties:
        name: { type: string }
        dob: { type: string }
        email: { type: string }
        phone: { type: string }
        address: { type: string }
        authorisedContacts:
          type: array
          items: { type: string }
    CoverExcess:
      type: object
      required: [fixed, coInsurance]
      properties:
        fixed: { type: number }
        coInsurance: { type: string }
    Cover:
      type: object
      required:
        - vetFeeLimit
        - vetFeeLimitType
        - remainingLimitThisYear
        - excess
        - complementaryTreatment
        - dental
        - thirdPartyLiability
        - exclusions
      properties:
        vetFeeLimit: { type: number }
        vetFeeLimitType: { type: string }
        remainingLimitThisYear: { type: number }
        excess: { $ref: "#/components/schemas/CoverExcess" }
        complementaryTreatment: { type: number }
        dental: { type: number }
        thirdPartyLiability: { type: number }
        exclusions:
          type: array
          items: { type: string }
    ClaimHistoryItem:
      type: object
      required:
        - id
        - claimId
        - dateSubmitted
        - condition
        - vet
        - amountClaimed
        - amountPaid
        - excessApplied
        - coInsuranceApplied
        - status
      properties:
        id: { type: string }
        claimId: { type: string }
        dateSubmitted: { type: string }
        condition: { type: string }
        vet: { type: string }
        amountClaimed: { type: number }
        amountPaid: { type: number }
        excessApplied: { type: number }
        coInsuranceApplied: { type: number }
        status: { type: string }
    CustomListRow:
      type: object
      required: [id]
      properties:
        id:
          type: string
          description: Stable unique id for this row
      additionalProperties:
        type: string
      description: Unique id plus map of admin-defined field keys to string values
    WorkOrder:
      type: object
      required: [id, title, type, status]
      properties:
        id: { type: string }
        title: { type: string }
        type:
          type: string
          enum: [maintenance, repair, inspection, cleaning]
        status:
          type: string
          enum: [scheduled, in_progress, completed]
        scheduledFor: { type: string }
        propertyId: { type: string }
    Invoice:
      type: object
      required: [id, reference, amount, currency, status]
      properties:
        id: { type: string }
        reference: { type: string }
        amount: { type: number }
        currency: { type: string }
        status:
          type: string
          enum: [draft, pending, paid, overdue]
        dueDate: { type: string }
    ContactData:
      type: object
      required:
        - email
        - name
        - company
        - role
        - segment
        - tags
        - properties
        - quotes
        - opportunities
        - orders
        - inquiries
        - cases
        - workOrders
        - contracts
        - timeline
        - attachments
        - pets
        - policies
        - policyholder
        - cover
        - claimsHistory
        - invoices
      properties:
        email: { type: string, format: email }
        name: { type: string }
        company: { type: string }
        role: { type: string }
        segment: { type: string }
        tags:
          type: array
          items: { type: string }
        properties:
          type: array
          items: { $ref: "#/components/schemas/Property" }
        quotes:
          type: array
          items: { $ref: "#/components/schemas/Quote" }
        opportunities:
          type: array
          items: { $ref: "#/components/schemas/Opportunity" }
        orders:
          type: array
          items: { $ref: "#/components/schemas/Order" }
        inquiries:
          type: array
          items: { $ref: "#/components/schemas/Inquiry" }
        cases:
          type: array
          items: { $ref: "#/components/schemas/Case" }
        workOrders:
          type: array
          items: { $ref: "#/components/schemas/WorkOrder" }
        contracts:
          type: array
          items: { $ref: "#/components/schemas/Contract" }
        timeline:
          type: array
          items: { $ref: "#/components/schemas/TimelineEvent" }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/Attachment" }
        pets:
          type: array
          items: { $ref: "#/components/schemas/Pet" }
        policies:
          type: array
          items: { $ref: "#/components/schemas/PolicyRecord" }
        policyholder:
          $ref: "#/components/schemas/Policyholder"
        cover:
          $ref: "#/components/schemas/Cover"
        claimsHistory:
          type: array
          items: { $ref: "#/components/schemas/ClaimHistoryItem" }
        invoices:
          type: array
          items: { $ref: "#/components/schemas/Invoice" }
